kind = "mobile"
previewPath = "/"
title = "Savvy - Personal Finance"
version = "1.0.0"
id = "artifacts/savvy"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20390

[services.development]
run = "pnpm --filter @workspace/savvy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/savvy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/savvy", "run", "serve" ]

[services.env]
PORT = "20390"
BASE_PATH = "/"
