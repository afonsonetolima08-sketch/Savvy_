<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savvy • Story Generator 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Outfit', sans-serif; color: white; overflow-x: hidden; }
        .story-wrapper {
            width: 360px; height: 640px;
            background: #011511;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(6, 78, 59, 0.3) 0%, transparent 50%);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .top-bars { display: flex; padding: 15px 10px; gap: 4px; }
        .bar { height: 2px; flex: 1; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .bar.active { background: white; }

        .logo-header { position: absolute; top: 40px; width: 100%; text-align: center; }
        
        .center-content { padding: 40px 30px; margin-top: 60px; position: relative; z-index: 2; }
        .badge { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); padding: 6px 14px; border-radius: 50px; display: inline-block; font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #10b981; margin-bottom: 20px; text-transform: uppercase; }
        .main-headline { font-family: 'Playfair Display', serif; font-size: 40px; line-height: 1.1; margin-bottom: 20px; font-weight: 900; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .phone-mockup {
            position: absolute;
            bottom: -50px; right: -40px;
            width: 280px; height: 400px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px;
            transform: rotate(-10deg);
            backdrop-filter: blur(20px);
            box-shadow: -20px 40px 60px rgba(0,0,0,0.5);
        }
        .mock-card { background: rgba(16, 185, 129, 0.2); height: 100px; border-radius: 15px; margin-bottom: 15px; padding: 15px; box-sizing: border-box; }
        .mock-line { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 10px; }
        .mock-circle { width: 24px; height: 24px; border-radius: 12px; background: white; margin-bottom: 10px; }
        
        .cta-box { position: absolute; bottom: 40px; left: 30px; background: white; color: #011511; padding: 14px 28px; border-radius: 50px; font-weight: 900; font-size: 14px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

        .controls { margin-top: 40px; display: flex; gap: 15px; }
        button { background: #10b981; color: #011511; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3); }
        #capture-canvas { display: none; }
    </style>
</head>
<body>
    <div class="story-wrapper" id="story">
        <div class="top-bars">
            <div class="bar active"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="center-content">
            <div class="badge">Acesso de Elite</div>
            <div class="main-headline">O Futuro das<br>Suas Finanças<br>Chegou.</div>
            <p style="opacity: 0.6; font-size: 14px; max-width: 200px; line-height: 1.6;">Sincroniza Stocks, Crypto e Imobiliário numa única interface premium.</p>
        </div>

        <div class="phone-mockup">
            <div class="mock-card">
                <div class="mock-circle"></div>
                <div class="mock-line" style="width: 60%"></div>
                <div class="mock-line" style="width: 40%; opacity: 0.5;"></div>
            </div>
            <div class="mock-line" style="width: 90%; margin-left: 5px;"></div>
            <div class="mock-line" style="width: 80%; margin-left: 5px;"></div>
            <div class="mock-line" style="width: 85%; margin-left: 5px;"></div>
        </div>

        <div class="cta-box">LINK NA BIO</div>
    </div>

    <div class="controls">
        <button onclick="downloadStory()">DESCARREGAR STORY HD</button>
    </div>

    <canvas id="capture-canvas" width="1080" height="1920"></canvas>

    <script>
        function downloadStory() {
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');
            
            // Background
            const grad = ctx.createLinearGradient(0,0,1080,1920);
            grad.addColorStop(0, "#011511");
            grad.addColorStop(1, "#00281f");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,1080,1920);

            // Glows
            const glow1 = ctx.createRadialGradient(200, 200, 0, 200, 200, 1000);
            glow1.addColorStop(0, "rgba(16, 185, 129, 0.2)");
            glow1.addColorStop(1, "transparent");
            ctx.fillStyle = glow1;
            ctx.fillRect(0,0,1080,1920);

            // Text Rendering
            ctx.fillStyle = "white";
            ctx.textAlign = "left";
            
            // Badge
            ctx.fillStyle = "rgba(16,185,129,0.2)";
            ctx.beginPath();
            ctx.roundRect(100, 150, 400, 80, 40);
            ctx.fill();
            ctx.fillStyle = "#10b981";
            ctx.font = "900 40px sans-serif";
            ctx.fillText("ACESSO DE ELITE", 150, 205);

            // Headline
            ctx.fillStyle = "white";
            ctx.font = "900 130px serif"; // Playfair fallback
            ctx.fillText("O Futuro das", 100, 420);
            ctx.fillText("Suas Finanças", 100, 560);
            ctx.fillText("Chegou.", 100, 700);

            // Desc
            ctx.font = "400 45px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.fillText("Sincroniza Stocks, Crypto", 100, 850);
            ctx.fillText("e Imobiliário numa", 100, 920);
            ctx.fillText("interface premium.", 100, 990);

            // Mockup (simplified for canvas)
            ctx.save();
            ctx.translate(600, 1100);
            ctx.rotate(-10 * Math.PI / 180);
            ctx.fillStyle = "rgba(255,255,255,0.08)";
            ctx.beginPath();
            ctx.roundRect(0, 0, 800, 1000, 80);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.restore();
            
            // CTA
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.roundRect(100, 1680, 520, 120, 60);
            ctx.fill();
            ctx.fillStyle = "#011511";
            ctx.font = "900 55px sans-serif";
            ctx.fillText("LINK NA BIO", 180, 1760);

            const pngUrl = canvas.toDataURL("image/png");
            const downloadLink = document.createElement("a");
            downloadLink.href = pngUrl;
            downloadLink.download = "savvy-story-luxury-v2.png";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
