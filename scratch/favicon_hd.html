<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: transparent; }
  .favicon-container {
    background: linear-gradient(135deg, #01241c 0%, #064e3b 100%);
    width: 256px; height: 256px;
    display: flex; justify-content: center; align-items: center;
    border-radius: 48px;
    position: relative;
  }
  .main-text {
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 180px;
    margin: 0;
  }
  .dollar-icon {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    color: #01241c;
    font-family: sans-serif;
    font-size: 40px;
    font-weight: 900;
  }
</style>
</head>
<body>
  <div class="favicon-container">
    <div class="dollar-icon">$</div>
    <h1 class="main-text">S</h1>
  </div>
</body>
</html>
